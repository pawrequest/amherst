{# error handler - returns a nice div with alert type handled... message, type and code #}
{% block content %}
    {%  if alerts %}
    <div class="wrapper">
        <div class="alert alert-{{ type }}">
            {% for alert in alerts %}
            <strong>{{ alert.type }}</strong> {{ alert.message }} ({{ alert.code }})
            {% endfor %}
        </div>
    </div>
    {% endif %}

{% endblock %}
