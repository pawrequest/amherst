<style>
    .search-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 400px;
        margin: auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background-color: #f9f9f9;
    }

    .search-container select, .search-container input, .search-container button {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .search-container button {
        background-color: #007bff;
        color: white;
        cursor: pointer;
    }

    .search-container button:hover {
        background-color: #0056b3;
    }

    .results {
        margin-top: 20px;
    }

    .result-item {
        padding: 10px;
        border-bottom: 1px solid #ccc;
    }
</style>

<div class="search-container">
    <label for="column">Select Column:</label>
    <select id="column" name="column">
        <option value="name">Name</option>
        <option value="customer_name">Customer Name</option>
        <option value="delivery_contact_phone">Delivery Contact Phone</option>
        <option value="delivery_contact_email">Delivery Contact Email</option>
        <option value="delivery_address_str">Delivery Address</option>
        <option value="delivery_address_pc">Delivery Address Postal Code</option>
        <option value="track_out">Track Out</option>
        <option value="track_in">Track In</option>
        <option value="arranged_out">Arranged Out</option>
        <option value="arranged_in">Arranged In</option>
        <option value="delivery_method">Delivery Method</option>
    </select>

    <label for="search_str">Search String:</label>
    <input type="text" id="search_str" name="search_str" placeholder="Enter search string...">

    <button onclick="performSearch()">Search</button>

    <div class="results" id="results"></div>
</div>

<script>
    async function performSearch() {
        const column = document.getElementById('column').value;
        const searchStr = document.getElementById('search_str').value;
        const response = await fetch(`/api/search/${column}/${searchStr}`);
        const data = await response.json();
        const resultsContainer = document.getElementById('results');
        resultsContainer.innerHTML = '';
        data.forEach(item => {
            const resultItem = document.createElement('div');
            resultItem.className = 'result-item';
            resultItem.textContent = JSON.stringify(item);
            resultsContainer.appendChild(resultItem);
        });
    }
</script>
