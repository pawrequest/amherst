{% for customer in customers %}
    <div class="record">
        <p>{{ customer.name }}</p>
    </div>
    {% if customer.hires %}
        {% for hire in customer.hires %}
            <div>
                Hire - {{ hire.send_date }}
            </div>
        {% endfor %}
    {% endif %}

    {% if customer.sales %}
        {% for sale in customer.sales %}
            <div>
                Sale - {{ sale.send_date }}
            </div>
        {% endfor %}
    {% endif %}

{% endfor %}
