<!-- templates/sidebar.html -->
{#<label for="filterInput">Filter</label>#}
{#<input type="text" id="filterInput" placeholder="Filter records..." onkeyup="filterRecords()">#}

<form id="searchForm"
      hx-target="#record-container"
      hx-swap="innerHTML"
      hx-trigger="input changed delay:10ms, search"
      hx-get='/search?csrname=Customer&filtered=false'
      onsubmit="return false"
>
    <label for="searchInput"></label>
    <input type="text" id="searchInput" name="pk_value" placeholder="Fetch New Records...">
</form>

<div class="record-container" id="record-container" hx-get="/search?csrname=Customer&filtered=true&py_filter=true"
     hx-trigger="load"
     hx-target="this" hx-swap="innerHTML">
</div>
