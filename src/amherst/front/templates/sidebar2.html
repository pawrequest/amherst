<!-- templates/sidebar.html -->
<label for="filterInput">Filter</label>
<input type="text" id="filterInput" placeholder="Filter records..." onkeyup="filterRecords()">

<form id="searchForm"
      hx-target="#record-container"
      hx-swap="innerHTML"
      hx-trigger="input changed delay:1000ms, search"
      hx-get='/search?csrname=Customer&filtered=false'
>
    <label for="searchInput">Search</label>
    <input type="text" id="searchInput" name="customer_name" placeholder="Fetch New Records...">
</form>

<div class="record-container" id="record-container" hx-get="/search?csrname=Customer&filtered=true"
     hx-trigger="load"
     hx-target="this" hx-swap="innerHTML">
</div>
