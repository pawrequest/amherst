{% extends "base.html" %}
{% block head %}
    <link href="{{ url_for('static', path='multi.css') }}" rel="stylesheet">
{% endblock %}
{% block sidebar %}
    <div id="sidebar" class="sidebar">
        <label for="filterInput">Filter</label>
        <input type="text" id="filterInput" placeholder="Filter records..." onkeyup="filterRecords()">

        <label for="searchInput">Search</label>
        <input type="text" id="searchInput" placeholder="Fetch New Records..."
               hx-trigger="input changed delay:1000ms, search"
               hx-get=>
        >

        <nav class="nav-bar">
            <a href="#" hx-get="/all/Customer" hx-target="#record-container"
               hx-swap="innerHTML" hx-trigger=>Customers</a>
            <a href="#" hx-get="/all/Hire" hx-target="#record-container"
               hx-swap="innerHTML">Hires</a>
            <a href="#" hx-get="/all/Sale" hx-target="#record-container"
               hx-swap="innerHTML">Sales</a>
        </nav>

        <div class="record-container" id="record-container" hx-get="/all/Customer"
             hx-trigger="load"
             hx-target="this" hx-swap="innerHTML">
        </div>

    </div>
{% endblock %}


{% block content %}
    <div id="details" class="details">
    </div>
<div id="maincontent" class="maincontent">

</div>
{% endblock %}

{% block scripts %}
    <script>

    </script>
{% endblock %}
