<!-- templates/detail_generic.html -->
<div class="record">
    {{ row.name }}
    {% if row.send_date %}
        <p>
            {{ row.dt_ordinal(row.send_date) }}
        </p>
    {% endif %}
    <button class="ship"
            hx-get="/ship/form?csrname={{ row.category }}&row_id={{ row.row_id }}"
            hx-target="#content-main">
        SHIPPY
    </button>
</div>
