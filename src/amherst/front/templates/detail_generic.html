<!-- templates/detail_generic.html -->
<div class="record">
    {{ row.name }}
    {% if row.send_date %}
        <p>
            {{ row.dt_ordinal(row.send_date) }}
        </p>
    {% endif %}
    <button class="ship"
            hx-get="/ship/form_content?csrname={{ row.category }}&row_id={{ row.row_id }}"
            hx-target="#content_main"
            hx-swap="innerHTML"
    >
        SHIPPY
    </button>
</div>
