<!-- templates/listing_generic.html -->
{#context = {response: SearchResponse}#}
{% for record in response.records %}
    <div class="record"
         hx-get="/ship/form_content?csrname={{ record.category | urlencode }}&row_id={{ record.row_id | urlencode }}"
         hx-target="#content_main"
         hx-swap="innerHTML"
    >
        {{ record.name }}

    </div>
{% endfor %}
{% if response.more %}
    {% include 'infinite.html' with context %}
{% endif %}
