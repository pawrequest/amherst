<!-- templates/listing_generic.html -->
{% for record in response.records %}
<div class="record"
     hx-get="/html/detail/{{ record.category }}?row_id={{ record.row_id }}"
     hx-target="#content-top">
    {{ record.name }}
</div>
{% endfor %}
{% if response.more %}
    {% include 'infinite.html' with context %}
{% endif %}
