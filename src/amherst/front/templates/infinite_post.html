<form onsubmit="return false">
    <input type="hidden" name="csrname" value={{ csrname }}>

    <div class="infinite"
         hx-post="search2/?offset={{ pagination.offset + pagination.limit }}&limit={{ pagination.limit }}"
         hx-trigger="revealed"
         hx-target="this"
         hx-swap="outerHTML"
         hx-include=""
    >
    </div>
</form>
