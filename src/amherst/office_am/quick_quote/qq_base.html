<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AmAssist{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.5.0/dist/htmx.min.js"></script>


    {% block head %}{% endblock %}
</head>
<body>
<header>
</header>

<main>
    {% block content %}
        <form>
           <fieldset>
               <legend>Equipment</legend>
               <label for="walkie-talkie">Walkie Talkie</label>
               <input type="number" id="walkie-talkie" name="walkie-talkie"><br>

               <label for="type">Type</label>
               <select id="type" name="type">
                   <option value="Hytera Digital">Hytera</option>
               </select><br>

               <label for="battery">Battery</label>
               <input type="number" id="battery" name="battery"><br>

               <label for="d-type">D-type</label>
               <input type="number" id="d-type" name="d-type"><br>

               <label for="semi-covert">Semi-Covert</label>
               <input type="number" id="semi-covert" name="semi-covert"><br>

               <label for="std-headset">Madonna</label>
               <input type="number" id="std-headset" name="std-headset"><br>

               <label for="case">Leather Case</label>
               <input type="number" id="case" name="case"><br>

               <label for="parrot">Parrot</label>
               <input type="number" id="parrot" name="parrot"><br>

               <label for="big-headset">Aircraft Headset</label>
               <input type="number" id="big-headset" name="big-headset"><br>

               <label for="mobile">Mobile</label>
               <input type="number" id="mobile" name="mobile"><br>

               <label for="base">Mobile</label>
               <input type="number" id="base" name="base"><br>

               <label for="car-sgl-chg-lead">Car power Lead for Walki</label>
               <input type="number" id="car-sgl-chg-lead" name="car-sgl-chg-lead"><br>

               <label for="clipon">Clipon</label>
               <input type="number" id="clipon" name="clipon"><br>

               <label for="magmount">Magmount</label>
               <input type="number" id="magmount" name="magmount"><br>

               <label for="adapter">Walkie - Aerial Adapter</label>
               <input type="number" id="adapter" name="adapter"><br>

               <label for="repeater">Repeater</label>
               <input type="number" id="repeater" name="repeater"><br>

               <label for="megaphone">Megaphone</label>
               <input type="number" id="megaphone" name="megaphone"><br>

               <label for="mega-batts">Megaphone Battery (Sets)</label>
               <input type="number" id="mega-batts" name="mega-batts"><br>

               <label for="mega-charger">Charger</label>
               <input type="checkbox" id="mega-charger" name="mega-charger"><br>

               <label for="wand">Security Wand</label>
               <input type="number" id="wand" name="wand"><br>

               <label for="wand-battery">Security Wand Spare Battery</label>
               <input type="number" id="wand-battery" name="wand-battery"><br>

               <label for="wand-charger">Security Wand Charger</label>
               <input type="number" id="wand-charger" name="wand-charger"><br>
           </fieldset>
       </form>
    {% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
