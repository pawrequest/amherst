[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "amherst"
description = "Add your description here"
version = "0.1.0"
authors = [
    { name = "Paw", email = "amherst+pawrequest@users.noreply.github.com" }
]
dependencies = [
    "fastuipr @git+https://github.com/pawrequest/fastuipr",
    'shipr @git+https://github.com/pawrequest/shipr',
    'pycommence @git+https://github.com/pawrequest/pycommence',
    'flaskwebgui @git+https://github.com/pawrequest/flaskwebgui',
    'pydantic',
    'fastapi',
    'pyinstaller',
    'pypdf',
    'sqlmodel',
    'uvicorn[standard]',
    'python-dotenv',
    'httpx',
]
readme = "README.md"
requires-python = ">= 3.12"


[tool.rye]
managed = false
dev-dependencies = [
    "pytest",
    "sphinx",
    "sphinx-rtd-theme",
    "myst-parser",
]

[tool.hatch.metadata]
allow-direct-references = true

#[tool.hatch.build.targets.wheel]
#packages = [
#    "amherst",
#]

[project.scripts]
am_address = "amherst.script:main"
ship_hire = "amherst.gui:main"
