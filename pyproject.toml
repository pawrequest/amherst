[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "amherst"
description = "Add your description here"
version = "0.1.0"
authors = [
    { name = "Paw", email = "amherst+pawrequest@users.noreply.github.com" }
]
readme = "README.md"
requires-python = ">= 3.12"
dependencies = [
    'shipr',
    'pycommence',
    'pawsupport[office]',
    'pydantic',
    'fastapi',
    'pypdf',
    'sqlmodel',
    'uvicorn[standard]',
    'python-dotenv',
    'httpx',
]
[project.optional-dependencies]
dev = [
    'pyinstaller',
    "pytest",
]


[tool.hatch.metadata]
allow-direct-references = true

#[tool.hatch.build.targets.wheel]
#packages = [
#    "amherst",
#]

[project.scripts]
am_address = "amherst.script:main"
ship_hire = "amherst.gui:main"
