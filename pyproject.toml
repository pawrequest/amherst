[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "amherst"
description = "Add your description here"
version = "0.1.0"
authors = [
    { name = "Paw", email = "amherst+pawrequest@users.noreply.github.com" }
]
readme = "README.md"
requires-python = ">= 3.12"
dependencies = [
    'pdf_tools @ git+https://github.com/pawrequest/pdf_tools',
    'pawdantic[ui, sql]',
    #    'fastuipr',
    'shipr',
    'pycommence',
    'suppawt',
    'pydantic',
    'fastapi',
    'pypdf',
    'sqlmodel',
    'uvicorn[standard]',
    'python-dotenv',
    'httpx',
]
[project.optional-dependencies]
dev = [
    'pyinstaller',
    "pytest",
]
git = [
    'shipr @ git+https://github.com/pawrequest/shipr',
    'pycommence @ git+https://github.com/pawrequest/pycommence',
    'suppawt @ git+https://github.com/pawrequest/suppawt', ]

[tool.rye]
managed = true
[tool.hatch.metadata]
allow-direct-references = true

