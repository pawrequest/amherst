[project]
name = "amherst"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "Paw", email = "amherst+pawrequest@users.noreply.github.com" }
]
dependencies = [
    'pawsupport[fast] @ git+https://github.com/pawrequest/pawsupport',
    'pydantic',
    'fastui[fastapi]',
    'pyinstaller',
    'pypdf',
    'context-menu',
    'sqlmodel',
    'uvicorn',
]
readme = "README.md"
requires-python = ">= 3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = [
    "pytest",
    "sphinx",
    "sphinx-rtd-theme",
    "myst-parser",
]

[tool.hatch.metadata]
allow-direct-references = true


