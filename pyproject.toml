[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "amherst"
description = "Add your description here"
version = "0.2.0"
authors = [
    { name = "Paw", email = "amherst+pawrequest@users.noreply.github.com" }
]
readme = "README.md"
requires-python = ">= 3.12"
dependencies = [
    'flaskwebgui @ git+https://github.com/pawrequest/flaskwebgui',
    'pycommence @ git+https://github.com/pawrequest/pycommence',
    'pawdf @ git+https://github.com/pawrequest/pawdf',
    'shipaw @ git+https://github.com/pawrequest/shipaw',
    'pawdantic[ui, sql] @ git+https://github.com/pawrequest/pawdantic',
    'suppawt @ git+https://github.com/pawrequest/suppawt',
    'pydantic-settings',
    'pydantic[email]',
    'email-validator',
    'pydantic-extra-types',
    'fastapi',
    'pypdf',
    'sqlmodel',
    'uvicorn[standard]',
    'python-dotenv',
    'httpx',
    "pywin32",
]

[project.optional-dependencies]
dev = [
    'pyinstaller',
    "pytest",
    "sphinx",
    "sphinx-autodoc-typehints",
    "sphinx-autodoc2",
    "sphinx-rtd-theme",
    "sphinx-readme",
    "myst-parser",
    "sphinx_rtd_dark_mode",
]
git = [
    'shipaw @ git+https://github.com/pawrequest/shipaw',
    'pycommence @ git+https://github.com/pawrequest/pycommence',
    'suppawt @ git+https://github.com/pawrequest/suppawt', ]

[tool.rye]
managed = false
dev-dependencies = [
    "sphinx",
    "sphinx-autodoc-typehints",
    "sphinx-autodoc2",
    "sphinx-rtd-theme",
    "sphinx-readme",
    "myst-parser",
    "sphinx_rtd_dark_mode",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
line-length = 120
