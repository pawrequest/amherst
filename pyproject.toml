[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "amherst"
description = "Add your description here"
version = "0.1.0"
authors = [
    { name = "Paw", email = "amherst+pawrequest@users.noreply.github.com" }
]
readme = "README.md"
requires-python = ">= 3.12"
dependencies = [
    'pdf_tools',
    'pycommence',
    'flaskwebgui',
    'fastuipr',
    'shipr',
    'pydantic',
    'fastapi',
    'pypdf',
    'sqlmodel',
    'uvicorn[standard]',
    'python-dotenv',
    'httpx',
]
[project.optional-dependencies]
dev = [
    'pyinstaller',
    "pytest",
]
all-git = [
    'pdf_tools @ git+https://github.com/pawrequest/pdf_tools',
    'pycommence @ git+https://github.com/pawrequest/pycommence',
    'flaskwebgui @ git+https://github.com/pawrequest/flaskwebgui',
    'fastuipr @ git+https://github.com/pawrequest/fastuipr',
    'shipr @ git+https://github.com/pawrequest/shipr',
]
shipr-git = [
    'shipr @ git+https://github.com/pawrequest/shipr',
]
fastuipr-git = [
    'fastuipr @ git+https://github.com/pawrequest/fastuipr',
]

[tool.hatch.metadata]
allow-direct-references = true

#[tool.hatch.build.targets.wheel]
#packages = [
#    "amherst",
#]

[project.scripts]
ship-hire = "amherst.amherst_fastui_app:main"
